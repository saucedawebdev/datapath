    <title>DATApath — Job Ready Edition</title>
    <script>
      (function () {
        try {
          var prefs = JSON.parse(localStorage.getItem('datapath-prefs') || '{}');
          var theme = prefs.theme || 'dark';
          var resolved = theme === 'system'
            ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
            : theme;
          document.documentElement.setAttribute('data-theme', resolved);
          if (prefs.fontSize) document.documentElement.setAttribute('data-font-size', prefs.fontSize);
          if (prefs.reducedMotion) document.documentElement.setAttribute('data-reduced-motion', 'true');
        } catch (e) { /* ignore */ }
      })();
    </script>
