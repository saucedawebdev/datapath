name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci
      - run: npm run validate:content
      - run: npm test

      - name: Build for GitHub Pages (project site)
        env:
          BASE_PATH: /${{ github.event.repository.name }}/
        run: npm run build

      - name: Verify dist uses repository base path (not source /src)
        run: |
          grep -q "/${{ github.event.repository.name }}/assets/" dist/index.html
          grep -q "/${{ github.event.repository.name }}/assets/main-" dist/index.html
          test ! -d dist/src
          ! grep -q 'src="/src/main.js"' dist/index.html

      - name: Publish dist to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true
